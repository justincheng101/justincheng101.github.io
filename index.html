<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {background-color: lightblue;}
        h1 {color: black}
        h3 {color: black}
        a {color: blue}
        div.relative {
            position: relative;
            width: 400px;
            height: 200px;
        }

        div.center {
            margin: 0;
            position: absolute;
            text-align: center;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        div.img {
            position: relative;
            width: 400px;
            height: 200px;
        }
        /* Add a background color to top nav bar */
        .topnav{
            border: 3px solid black;
            background-color: lightblue; 
            overflow: hidden;
        }

        /* Style the links inside the nav bar */
        .topnav a {
            float: left;
            display: block;
            color: black;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            font-size: 17px;
        }

        /* Hide the link that should open and close the topnav on small screens */
        .topnav .icon {
            display: none;
        }

        /* Change the color of links on hover */
        .topnav a:hover {
            background-color: #ddd;
            color: black;
        }

        .topnav-centered-right a{
            float: none;
            position: absolute;
            top: 5%;
            right: 25%;
            transform: translate(-50%, -50%);
        }

        .topnav-centered-left a{
            float: none;
            position: absolute;
            top: 5%;
            left: 25%;
            transform: translate(50%, -50%);
        }

        .topnav-right a{
            float: right;
        }
    </style>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

            <div class="topnav-centered-left">

            </div>
            <div class="topnav-centered-right">
                <a href = "https://github.com/justincheng101" target = "_blank">Github</a>
            </div>
            <div class="topnav-right">
                <a href="#about">About</a>
            </div>
            <a href="javascript:void(0);" class="icon" onclick="myFunction()">
                <i class="fa fa-bars"></i>
            </a>
        </div>
    <div class = "center">
        <h1>
            Justin Cheng

            Welcome to my website!
